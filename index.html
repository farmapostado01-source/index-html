<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Timer Live</title>

<style>
html, body {
  margin: 0;
  padding: 0;
  background: transparent;
  overflow: hidden;
}

#timer {
  color: white;
  text-shadow: 0 0 10px black;
  font-size: 80px;
  font-family: Arial;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 80vh;
}

#controls {
  position: fixed;
  bottom: 10px;
  width: 100%;
  text-align: center;
}

button {
  font-size: 20px;
  padding: 10px 20px;
  margin: 5px;
}
</style>

</head>
<body>

<div id="timer">01:00:00</div>

<div id="controls">
  <button onclick="addTime(60)">+1 min</button>
  <button onclick="addTime(300)">+5 min</button>
  <button onclick="addTime(600)">+10 min</button>
</div>

<script>
let time = 3600;

function updateDisplay() {
  let h = String(Math.floor(time / 3600)).padStart(2,'0');
  let m = String(Math.floor((time % 3600) / 60)).padStart(2,'0');
  let s = String(time % 60).padStart(2,'0');
  document.getElementById("timer").innerText = `${h}:${m}:${s}`;
}

setInterval(() => {
  if(time > 0) time--;
  updateDisplay();
}, 1000);

function addTime(seconds) {
  time += seconds;
}
</script>

</body>
</html>
