<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Timer Live</title>
<style>
body {
  margin: 0;
text-shadow: 0 0 20px black;
  color: white;
  font-size: 80px;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  font-family: Arial;
}
</style>
</head>
<body>
<div id="timer">01:00:00</div>

<script>
let time = 3600;

function updateDisplay() {
  let h = String(Math.floor(time / 3600)).padStart(2,'0');
  let m = String(Math.floor((time % 3600) / 60)).padStart(2,'0');
  let s = String(time % 60).padStart(2,'0');
  document.getElementById("timer").innerText = `${h}:${m}:${s}`;
}

setInterval(() => {
  if(time > 0) time--;
  updateDisplay();
}, 1000);

// DETECTA ALERTA NA TELA (TRUQUE)
const observer = new MutationObserver(() => {
  const bodyText = document.body.innerText;

  // procura valor tipo "R$1", "R$5"
  const match = bodyText.match(/R\$(\d+)/);

  if (match) {
    let valor = parseInt(match[1]);
    time += valor * 60;

    // evita somar várias vezes
    observer.disconnect();
  }
});

observer.observe(document.body, {
  childList: true,
  subtree: true
});
</script>
</body>
</html>
