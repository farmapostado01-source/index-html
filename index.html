<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Timer Live</title>

<style>
html, body {
  margin: 0;
  padding: 0;
  background: transparent !important;
  overflow: hidden;
}

#timer {
  color: white;
  text-shadow: 0 0 10px black;
  font-size: 80px;
  font-family: Arial, sans-serif;
  width: 100%;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
}
</style>

</head>
<body>

<div id="timer">01:00:00</div>

<script>
let time = 3600; // 1 hora

function updateDisplay() {
  let h = String(Math.floor(time / 3600)).padStart(2,'0');
  let m = String(Math.floor((time % 3600) / 60)).padStart(2,'0');
  let s = String(time % 60).padStart(2,'0');
  document.getElementById("timer").innerText = `${h}:${m}:${s}`;
}

setInterval(() => {
  if(time > 0) time--;
  updateDisplay();
}, 1000);

// Detecta valores do alerta (LivePix)
const observer = new MutationObserver(() => {
  const text = document.body.innerText;
  const match = text.match(/R\$(\d+)/);

  if (match) {
    let valor = parseInt(match[1]);
    time += valor * 60;
  }
});

observer.observe(document.body, {
  childList: true,
  subtree: true
});
</script>

</body>
</html>
